years: {min: 1999, max: 2004}
price_eur: {min: 4000, max: 26000}
mileage_km: {min: 0, max: 220000}
fx:
  PLN: 0.23   # 1 PLN -> EUR
  GBP: 1.17
  EUR: 1.0
keywords:
  convertible: ["convertible", "cabrio", "kabriolet", "roadster", "cabriolet"]
  automatic: ["automatic", "automat", "automatik", "tiptronic", " a/t", "automatyczna"]
  salvage: ["salvage", "powypadkowy", "uszkodzony", "unfallwagen", "rebuilt", "odbudowany", "szkoda całkowita", "do remontu"]
vin:
  require_engine_cylinders: 8
  reject_displacement_below: 4.0     # rejects 3.8L V6
  reject_body_contains: ["convertible", "cabriolet"]
  reject_trim_contains: ["cobra", "svt"]
scoring:
  min_score_to_alert: 60
notify:
  first_run_digest_cap: 15
# Cost note: actors below are PAY-PER-RESULT (not rental). Cost roughly:
#   results_per_run * runs_per_day * 30 * avg_$/1k
# With 20 results × 4 runs/day × 4 sites = 320/day ≈ 9.6k/mo ≈ $5-15/mo at these actors.
# Tune `maxResults` and the workflow cron if you want it cheaper / more aggressive.
sites:
  otomoto:
    enabled: true
    apify_actor: "automation-lab/otomoto-scraper"   # PPR, $0.60 / 1k
    run_input:
      startUrls:
        - "https://www.otomoto.pl/osobowe/ford/mustang?search%5Bfilter_float_year%3Afrom%5D=1999&search%5Bfilter_float_year%3Ato%5D=2004"
      maxResults: 20
  olx:
    # DISABLED 2026-05-30: actor returns "Forbidden — requires full account access".
    # The Apify token was created with limited scope. To enable: in Apify Console
    # create a NEW token with full access (Integrations → API → Create new token →
    # set permissions to "All actor permissions"), then update GH secret APIFY_TOKEN.
    enabled: false
    apify_actor: "123webdata/olx-scraper"   # PPR, $5 / 1k
    run_input:
      categoryUrls:
        - "https://www.olx.pl/motoryzacja/samochody/ford-mustang/"
      maxResultsPerScrape: 20
      usePagination: false
  mobilede:
    enabled: true
    apify_actor: "3x1t/mobile-de-scraper-ppr"   # PPR, ~$0.30 / 1k
    # Use the actor's structured inputs (the make/model URL IDs are not Ford Mustang's).
    run_input:
      searchTerms: ["Ford Mustang"]
      registrationDateYearMin: 1999
      registrationDateYearMax: 2004
      maxItems: 20
  autoscout24:
    # DISABLED 2026-05-30: same Forbidden error as OLX — needs full-access Apify token.
    enabled: false
    apify_actor: "3x1t/autoscout24-scraper-ppr"   # PPR, $1.29 / 1k
    run_input:
      startUrls:
        - "https://www.autoscout24.de/lst/ford/mustang?fregfrom=1999&fregto=2004"
      resultLimitPerThread: 20
  willhaben:
    enabled: false   # best-effort; enable once a working actor is confirmed
    apify_actor: ""
    run_input: {}
